language: "en"

reviews:
  profile: chill
  high_level_summary: true

  auto_review:
    enabled: true
    drafts: false

  path_instructions:
    - path: "**/*.py"
      instructions: |
        Review all Python code changes in the repository.
        Focus on correctness, security, performance, and maintainability.
        Pay special attention to:
        - logic errors and edge cases
        - unsafe operations or insecure patterns
        - inefficient algorithms or unnecessary complexity
        - readability and maintainability of Python code

  tools:
    shellcheck:
      enabled: true

    markdownlint:
      enabled: true